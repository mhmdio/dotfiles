# tmux — keybindings + status. Structural options + plugins are wired in
# home/tmux.nix (prefix=C-b, vi keys, mouse, resurrect/continuum, navigator).
# Edit this file for binds and looks; reload live with `prefix r`.

# ── second prefix: Ctrl+' ────────────────────────────────────────────────────
# Ctrl+' is not a normal terminal key (apostrophe carries no control code), so it
# only reaches tmux when extended keys (CSI-u) are enabled AND the outer terminal
# reports it. WezTerm supports extended keys; test with: press Ctrl+' — the PREFIX
# badge in the status bar should light up. If it doesn't, the terminal isn't
# sending it (swap prefix2 for a control key like C-Space).
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g prefix2 "C-'"

# ── modern defaults ──────────────────────────────────────────────────────────
set -ga terminal-overrides ",*:Tc" # truecolor passthrough (Catppuccin via the terminal)
set -s set-clipboard on # apps inside tmux set the system clipboard (OSC52 — works over ssh)
set -g detach-on-destroy off # killing a session jumps to another instead of detaching
set -g renumber-windows on # keep window numbers gap-free after closing one
setw -g allow-passthrough on # let programs pass escape sequences through (image previews…)
# windows + panes already start at 1 (base-index/pane-base-index set in home/tmux.nix)

# ── panes & windows (additive — the default binds still work too) ────────────
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}" # \ = side-by-side split, no Shift (| still works)
bind - split-window -v -c "#{pane_current_path}"

# Prefix + hjkl selects panes; C-hjkl with no prefix also hops nvim↔tmux (navigator).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Prefix + HJKL resizes (repeatable: hold within the repeat window).
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind C-l send-keys 'C-l' # navigator swallows the shell's C-l; prefix C-l still clears
# Reorder windows with prefix + < / > (keeps focus on the moved window).
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1
bind Tab last-window # prefix Tab → previous window

# ── sessions ─────────────────────────────────────────────────────────────────
bind f display-popup -E -w 60% -h 70% "tmux-sessionizer" # fzf project picker
bind s choose-tree -Zs # zoomed session/window tree

# ── copy mode (vi); system clipboard handled by tmux-yank (`y` / mouse-drag) ──
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi Escape send -X cancel

bind r source-file ~/.config/tmux/tmux.conf \; display "tmux reloaded"

# ── status: theme-agnostic. Mauve accent (identical in Catppuccin Latte + Mocha)
#    is used as FOREGROUND for legibility; filled segments use `reverse`, so their
#    text takes the terminal's own background colour and stays readable in light AND
#    dark. The session pill fills solid mauve the moment the prefix is held.
set -g status-interval 5
set -g status-style "fg=default,bg=default"
set -g status-justify left
# NB: commas inside #[...] would be read as the #{?:} branch separators, so the
# style sits OUTSIDE the conditional and the conditional only toggles #[reverse].
set -g status-left "#[fg=magenta,bold]#{?client_prefix,#[reverse],} ● #S #[default] "
set -g status-left-length 50
# status-right (CPU/RAM/disk) is set in home/tmux.nix, next to the cpu plugin, so
# the plugin can rewrite its #{...} placeholders before the main config loads.
setw -g window-status-current-format "#[fg=magenta,reverse,bold] #I #W #[noreverse]"
setw -g window-status-format "#[fg=default] #I #W "
setw -g window-status-separator ""
set -g pane-active-border-style "fg=magenta"
set -g pane-border-style "fg=default"
set -g mode-style "fg=magenta,reverse,bold"
set -g message-style "fg=magenta,reverse,bold"
set -g display-time 1500
