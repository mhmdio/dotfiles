# tmux (~/.config/tmux/tmux.conf)

# Truecolor: pass the terminal's own palette through (wezterm = Catppuccin).
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

set -g focus-events on    # forward focus in/out to nvim, etc.
set -sg escape-time 10    # don't stall ESC (arrow keys / zsh + nvim vi-mode)
set -g mouse on           # scroll, click-select, drag-resize
set -g history-limit 100000

set -g base-index 1       # number windows/panes from 1
setw -g pane-base-index 1
set -g renumber-windows on

# vi everywhere — matches nvim, yazi, lazygit, zsh.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Splits keep the current path; intuitive | and -.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# hjkl to move panes, HJKL to resize (vim-consistent).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

bind r source-file ~/.config/tmux/tmux.conf \; display "reloaded"

# Minimal status — inherits terminal colors (named ANSI = Catppuccin via wezterm).
set -g status-style "bg=default fg=default"
set -g status-justify left
set -g status-left "#[bold] #S  "
set -g status-right ""
setw -g window-status-current-format "#[reverse] #I:#W "
setw -g window-status-format " #I:#W "
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=brightblack"
